    <style>
      :root {
        --color-bg: #e6e2dc;
        --color-text: #222228;
        --color-signal: #8a3520;
        --color-border-hover: #7a7e83;
        --color-blog: #e74c3c;
        --color-linkedin: #0e76a8;
        --color-bluesky: #0085ff;
        --color-stackoverflow: #777777;
        --color-github: #171515;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-bg: #222228;
          --color-text: #e6e2dc;
          --color-signal: #ee6848;
          --color-border-hover: #7baabb;
        }
      }
      /* body.container (0,1,1) beats Tailwind class selectors (0,1,0) */
      body.container {
        background-color: var(--color-bg);
        color: var(--color-text);
        font-family: 'Barlow', system-ui, -apple-system, sans-serif;
      }
      /* same specificity as Tailwind's rule; <style> appears after <link> so wins by cascade order */
      .hover\:border-gray-400:hover {
        border-color: var(--color-border-hover);
      }
      .tooltip {
        position: relative;
      }
      .tooltip .tooltip-text {
        visibility: hidden;
        opacity: 0;
        color: var(--color-text);
        text-align: center;
        padding: 2px 6px;
        position: absolute;
        left: 50%;
        top: 100%;
        z-index: 10;
        width: 110px;
        transform: translateX(-50%) translateY(-4px);
        transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out, visibility 0s linear 0.3s;
      }
      .tooltip:hover .tooltip-text,
      .tooltip:focus-within .tooltip-text {
        visibility: visible;
        opacity: 1;
        transform: translateX(-50%) translateY(4px);
        transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
      }
      .tooltip a:focus-visible img,
      .tooltip a:focus-visible #bluesky {
        outline: 2px solid var(--color-signal);
        outline-offset: 3px;
      }
      @media (min-width: 640px) {
        /* body.container (0,1,1) beats .flex (0,1,0) */
        body.container {
          display: grid;
          grid-template-columns: 180px auto;
          grid-template-rows: auto auto;
          grid-template-areas: "avatar info" "avatar links";
          column-gap: 3rem;
          row-gap: 0.75rem;
          justify-content: center;
          align-content: center;
        }
        body.container > header {
          grid-area: avatar;
          align-self: center;
          margin-top: 0;
        }
        body.container > main {
          grid-area: info;
          align-self: end;
        }
        /* body.container > nav (0,1,2) beats .justify-center and .flex-grow (0,1,0) */
        body.container > nav {
          grid-area: links;
          align-self: start;
          justify-content: flex-start;
          flex-grow: 0;
        }
        body.container > main h1,
        body.container > main p {
          text-align: left;
        }
        body.container > main h1 {
          font-size: clamp(1.75rem, 3vw, 2.5rem);
          line-height: 1.15;
          letter-spacing: -0.01em;
        }
      }
      @media (max-width: 639px) {
        /* no Tailwind rule sets body padding; no competition */
        body {
          padding-left: 1rem;
          padding-right: 1rem;
        }
        /* body.container > nav (0,1,2) beats .flex-grow (0,1,0) */
        body.container > nav {
          flex-grow: 0;
        }
        /* #content h1 (1,0,1) beats .text-2xl and .leading-8 (0,1,0) */
        #content h1 {
          font-size: clamp(1.875rem, 8vw, 2.25rem);
          line-height: 1.4;
        }
        .tooltip > a {
          display: flex;
          flex-direction: column;
          align-items: center;
        }
        /* .tooltip .tooltip-text (0,2,0) matches base rule specificity; wins by source order */
        .tooltip .tooltip-text {
          position: static;
          visibility: visible;
          opacity: 1;
          transform: none;
          width: auto;
          margin-top: 4px;
          font-size: 0.75rem;
          color: var(--color-text);
          white-space: nowrap;
        }
      }
      /* !important is legitimate here: must override inline styles for accessibility */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          transition-duration: 0.01ms !important;
        }
      }
    </style>
